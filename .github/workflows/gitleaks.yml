name: Secret scan

# Blocks PRs and fails main pushes that introduce committed secrets.
# Belt-and-suspenders complement to .gitignore — if someone bypasses
# the ignore (force-add, new file) gitleaks catches it at CI time.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so PRs can scan their diff

      - name: Install gitleaks binary
        # gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for any
        # GitHub org account. Running the upstream binary directly is
        # free, deterministic, and version-pinnable.
        run: |
          VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar xzf /tmp/gitleaks.tgz -C /tmp
          /tmp/gitleaks version

      - name: Run gitleaks scan
        run: |
          /tmp/gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --exit-code 1 \
            --report-path /tmp/gitleaks-report.json \
            --report-format json

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: /tmp/gitleaks-report.json
          retention-days: 7

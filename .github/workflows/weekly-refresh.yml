name: Weekly refresh

# Regenerates /api/v1/*.json by re-running the BigQuery-driven
# analyses (H6-H15, H18) every Monday 09:00 UTC.
#
# The endpoint-liveness crawl (H1-H5) and H22 gauge need a multi-host
# network probe that doesn't belong on GitHub runners. Those numbers
# are refreshed out-of-band (see crawler/ README + analysis/h1_h5_h22_full.py)
# and the weekly workflow only updates the BQ-derived findings.
#
# Required secrets:
#   GCP_SERVICE_ACCOUNT_KEY  — JSON service account with BigQuery jobUser +
#                              dataViewer on the ndh dataset AND dataViewer
#                              on bigquery-public-data.nppes

on:
  schedule:
    - cron: "0 9 * * 1"   # Monday 09:00 UTC
  workflow_dispatch:      # manual trigger

permissions:
  contents: write

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Re-run BQ analyses + PR findings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install google-cloud-bigquery

      - name: Authenticate to Google Cloud
        # v2.1.11+ writes the creds file to $RUNNER_TEMP (outside the
        # workspace). We also .gitignore gha-creds-*.json as defense
        # in depth — a prior run leaked a key that ended up in
        # chore/weekly-refresh because `git add -A` scooped it from
        # the workspace. Google auto-disabled the key.
        uses: google-github-actions/auth@v2.1.11
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Re-run temporal (H18)
        run: python analysis/h18_temporal.py

      - name: Re-run NPI Luhn (H9)
        run: python analysis/h9_npi_luhn.py

      - name: Download CMS Medicare Taxonomy Crosswalk
        run: curl -sL "https://data.cms.gov/sites/default/files/2025-12/2c2c6ece-e78f-45be-ba66-4e92075fbb7a/Medicare_Provider_and_Supplier_Taxonomy_Crosswalk_October_2025.csv" -o /tmp/crosswalk.csv

      - name: Re-run NPPES + NUCC + Crosswalk (H10-H13)
        run: python analysis/h10_h13_with_crosswalk.py

      - name: Re-run referential integrity (H6-H8)
        run: python analysis/h6_h8_integrity.py

      - name: Re-run duplicate detection (H14-H15)
        run: python analysis/h14_h15_duplicates.py

      - name: Re-run state-scoped findings (VA, PA, OH)
        # State pages support state Medicaid agencies responding to the
        # 2026-04-23 CMS State Medicaid Director letter on provider
        # revalidation strategies. Add states here as they're registered
        # in analysis/state_findings.py STATE_NAMES and frontend/src/data/states.ts.
        run: python analysis/state_findings.py va pa oh

      - name: Re-run high-risk cohort (H23, composite score)
        # Composite revalidation prioritization signal aligned with 42 CFR
        # § 455.436. Combines NPPES match, deactivation, and Luhn signals
        # into a per-NPI score. LEIE/SAM ingestion will extend this once
        # those data sources are added.
        run: python analysis/high_risk_cohort.py

      - name: Stamp stats.json with run metadata
        run: |
          python - <<'PY'
          import json, os, pathlib, subprocess
          p = pathlib.Path('frontend/public/api/v1/stats.json')
          stats = json.loads(p.read_text())
          stats['commit_sha'] = os.environ['GITHUB_SHA'][:7]
          stats['generated_at'] = os.environ['GITHUB_RUN_STARTED'] if 'GITHUB_RUN_STARTED' in os.environ else stats['generated_at']
          p.write_text(json.dumps(stats, indent=2) + '\n')
          PY

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet frontend/public/api/v1/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git --no-pager diff --stat frontend/public/api/v1/
          fi

      - name: Commit + push directly to main
        # Demo site: refresh outputs are deterministic (BQ queries over
        # versioned analysis scripts). No human review adds signal, so
        # push directly rather than opening a PR. Also: the org policy
        # disallows Actions from creating PRs, which makes the PR path
        # a non-starter without a PAT. If the repo ever graduates to
        # "needs review," switch back to peter-evans/create-pull-request
        # and set `admin:org` → "Allow Actions to create pull requests".
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "ainpi-weekly-refresh"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/api/v1/
          git commit -m "Weekly refresh: regenerate /api/v1/*.json from latest BQ analyses"
          git push origin main
